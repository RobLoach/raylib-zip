name: Tests
on:
  push:
    branches: [master]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update
      - run: sudo apt-get install -y xorg-dev libglu1-mesa-dev
      - run: cmake -B build .
      - run: cmake --build build
      - run: ctest --test-dir build --output-on-failure
